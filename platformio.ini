; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
 
monitor_speed = 115200 
upload_speed = 921600 
board_build.flash_mode = dio 
board_build.mcu = esp32c3 
board_build.f_cpu = 160000000L

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

lib_extra_dirs = lib
lib_deps =
  bblanchon/ArduinoJson
  knolleary/PubSubClient
  tzapu/WiFiManager
  esphome/AsyncTCP-esphome
  esphome/ESPAsyncWebServer-esphome
  adafruit/Adafruit NeoPixel

[env:gate]
build_src_filter = +<main_gate.cpp>

[env:4relays]
build_src_filter = +<main_4relays.cpp>

[env:garage_door]
build_src_filter = +<main_garage_door.cpp>
lib_deps =
  bblanchon/ArduinoJson
  knolleary/PubSubClient
  tzapu/WiFiManager
  esphome/AsyncTCP-esphome
  esphome/ESPAsyncWebServer-esphome
  adafruit/Adafruit NeoPixel
  pololu/VL53L0X

[env:example_veml7700]
build_src_filter = +<main_example_veml7700.cpp>
lib_deps =
  bblanchon/ArduinoJson
  knolleary/PubSubClient
  tzapu/WiFiManager
  esphome/AsyncTCP-esphome
  esphome/ESPAsyncWebServer-esphome
  adafruit/Adafruit NeoPixel
  adafruit/Adafruit VEML7700 Library

[env:example_vl53l0x]
build_src_filter = +<main_example_vl53l0x.cpp>
lib_deps =
  bblanchon/ArduinoJson
  knolleary/PubSubClient
  tzapu/WiFiManager
  esphome/AsyncTCP-esphome
  esphome/ESPAsyncWebServer-esphome
  adafruit/Adafruit NeoPixel
  pololu/VL53L0X
